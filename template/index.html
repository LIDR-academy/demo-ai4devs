<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inversor de Texto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    .input-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    button:disabled {
      cursor: not-allowed;
    }
    #result-click,
    #result-change {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Inversor de Texto</h1>
  
  <div class="input-group">
    <input type="text" id="textInput" placeholder="Escribe algo..." />
    <button id="reverseButton" disabled title="Debe ingresar más de 3 caracteres">Invertir</button>
  </div>

  <p id="result-click"></p>
  <p id="result-change"></p>

  <script src="script.js"></script>
</body>
</html>
